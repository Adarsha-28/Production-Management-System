spring.application.name=prodexa-backend
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/prodexa_db
spring.datasource.username=postgres
spring.datasource.password=Ohmmuruga@100
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=ProdexaSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.prodexa=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
